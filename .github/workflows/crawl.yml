name: WTT Crawler

on:
  schedule:
    # 每 4 小时执行一次 (UTC 时间)
    # 对应北京时间大约是：04:00, 08:00, 12:00, 16:00, 20:00, 00:00
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许在 GitHub 界面手动点击运行

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    # 关键修复：赋予写权限，允许 push 代码
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Crawler Script
      env:
        # 如果配置了 AI Key，可以在 GitHub Secrets 里设置
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: |
        python backend/crawler/crawler.py

    - name: Commit and push changes
      # 注意：这会将更新后的 SQLite 数据库提交回仓库
      # 仅适用于个人项目/演示。生产环境建议使用 Supabase/MySQL 等外部数据库。
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add backend/db/news.db
        # 如果有变动才提交，避免报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news database" && git push)
