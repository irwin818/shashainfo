name: WTT Crawler

on:
  schedule:
    # 每 4 小时执行一次 (UTC 时间)
    # 对应北京时间大约是：04:00, 08:00, 12:00, 16:00, 20:00, 00:00
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许在 GitHub 界面手动点击运行

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: false # 必须设置为 false，否则会使用默认 token

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Crawler Script
      env:
        # 如果配置了 AI Key，可以在 GitHub Secrets 里设置
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: |
        python backend/crawler/crawler.py

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add backend/db/news.db
        # 如果没有变化，这里会退出（这是正常的，不需要报错）
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update news database"

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
